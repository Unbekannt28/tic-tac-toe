<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css"><!--Material Design Icons-->
    <link rel="stylesheet" href="css/index.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
</head>
<body>
    <div class="header">
        <div class="left-section">
            <a href="lobby" class="icon-text-button">
                <span class="mdi mdi-controller"></span>
                <p>Spielen</p>
            </a>
            <a href="leaderboard" class="icon-text-button">
                <span class="mdi mdi-list-box"></span>
                <p>Leaderboard</p>
            </a>
        </div>
        <div class="right-section">
            {% if session["logged_in"] %}
                <a href="login/end_session" class="icon-text-button">
                    <span class="mdi mdi-account"></span>
                    <p>Logout</p>
                </a>
            {% else %}
                <a href="login" class="icon-text-button">
                    <span class="mdi mdi-account-outline"></span>
                    <p>Login</p>
                </a>
            {% endif %}
        </div>
    </div>
    <div class="content">
        <h1>Tic Tac Toe</h1>
        <p>Spiele Tic Tac Toe online gegen deine Freunde und messt euch in einem globalen Leaderboard!</p>
        {% if session["logged_in"] %}
            <a href="lobby" class="icon-text-button">
                <span class="mdi mdi-controller"></span>
                <p>Jetzt Spielen!</p>
            </a>
        {% else %}
            <a href="register" class="icon-text-button">
                <span class="mdi mdi-account"></span>
                <p>Jetzt Registrieren!</p>
            </a>
        {% endif %}
    </div>
</body>
</html>
